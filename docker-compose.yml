services:
  postgres:
    image: postgres:16-alpine
    container_name: rich-postgres
    environment:
      POSTGRES_USER: rich
      POSTGRES_PASSWORD: rich
      POSTGRES_DB: rich
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rich -d rich"]
      interval: 5s
      timeout: 3s
      retries: 10
